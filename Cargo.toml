[package]
name = "layer-shell-io"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib", "lib"]
name = "layer_shell_io"

[dependencies]
anyhow = { version = "1", default-features = false, features = [
    "std",
    "backtrace",
] }
log = { version = "0.4", default-features = false }
env_logger = { version = "0.11", default-features = false, features = [
    "auto-color",
] }
libc = "0.2"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
dbus = { package = "mini-sansio-dbus", version = "5.0.2" }
dns = { package = "mini-sansio-dns", version = "2.0.0" }
openssl-sys = "0.9"
string-bath = { version = "0.2.3" }
jzon = "0.12"
boml = "2.0"
rustix = { version = "1.1.4", default-features = false, features = [
    "std",
    "net",
    "fs",
] }

[build-dependencies]
cc = "1"

[profile.release]
opt-level = "z"
lto = true
panic = "abort"
codegen-units = 1

[[example]]
name = "just-io"
path = "src/examples/just-io.rs"
